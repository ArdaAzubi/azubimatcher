<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" role="img" aria-label="Fotoaehnliche Szene fuer Busfahrer und Busfahrerin mit Linienbus an Haltestelle">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
