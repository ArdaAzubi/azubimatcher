<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" role="img" aria-label="Fotoaehnliche Szene fuer Speditionskaufmann und Speditionskauffrau mit Monitor, Versanddokumenten und LKW-Modell">
