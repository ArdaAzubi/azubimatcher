      <stop offset="100%" stop-color="#a17654"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#5a3d2a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="800" height="480" rx="28" fill="url(#bg)"/>
  <rect x="50" y="54" width="700" height="372" rx="34" fill="#ffffff" opacity="0.96" filter="url(#shadow)"/>
  <rect x="92" y="92" width="616" height="156" rx="22" fill="#f7efe6"/>
  <rect x="92" y="248" width="616" height="120" fill="url(#floor)"/>

  <g filter="url(#shadow)">
