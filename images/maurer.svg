    <path d="M640 174 l44 -12" fill="none" stroke="#b79af0" stroke-width="8" stroke-linecap="round"/>
    <path d="M528 124 h56" fill="none" stroke="#f5bf3f" stroke-width="18" stroke-linecap="round"/>
    <path d="M574 106 c0 -20 -14 -34 -34 -34 h-18 c-20 0 -34 14 -34 34" fill="none" stroke="#f5bf3f" stroke-width="18" stroke-linecap="round"/>
