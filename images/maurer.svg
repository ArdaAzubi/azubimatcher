    <g fill="url(#wall)">
      <rect x="156" y="176" width="84" height="34" rx="6"/>
      <rect x="248" y="176" width="84" height="34" rx="6"/>
      <rect x="340" y="176" width="84" height="34" rx="6"/>
      <rect x="202" y="216" width="84" height="34" rx="6"/>
      <rect x="294" y="216" width="84" height="34" rx="6"/>
      <rect x="156" y="256" width="84" height="34" rx="6"/>
      <rect x="248" y="256" width="84" height="34" rx="6"/>
      <rect x="340" y="256" width="84" height="34" rx="6"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="494" y="286" width="84" height="52" rx="10" fill="#b08a67"/>
    <rect x="516" y="262" width="84" height="52" rx="10" fill="#c79d74"/>
    <rect x="538" y="238" width="84" height="52" rx="10" fill="#e0b084"/>
