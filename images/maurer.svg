<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" role="img" aria-label="Fotoaehnliche Szene fuer Maurer und Maurerin mit Mauerwerk, Kelle und Baumaterial">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6ef"/>
      <stop offset="100%" stop-color="#efe7ff"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffa864"/>
      <stop offset="100%" stop-color="#d97342"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="1">
